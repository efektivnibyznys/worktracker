name: Supabase encrypted backup

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Create encrypted database backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          test -n "$SUPABASE_DB_URL"
          test -n "$BACKUP_PASSPHRASE"

          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          mkdir -p backups

          PGCONNECT_TIMEOUT=20 timeout 60s pg_dump \
            --dbname "$SUPABASE_DB_URL" \
            --format custom \
            --no-password \
            --no-owner \
            --no-acl \
            --file "backups/worktracker-$timestamp.dump"

          gpg \
            --batch \
            --yes \
            --symmetric \
            --cipher-algo AES256 \
            --passphrase "$BACKUP_PASSPHRASE" \
            --output "backups/worktracker-$timestamp.dump.gpg" \
            "backups/worktracker-$timestamp.dump"

          rm "backups/worktracker-$timestamp.dump"

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/*.dump.gpg
          if-no-files-found: error
          retention-days: 90
